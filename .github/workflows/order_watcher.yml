name: 실시간 주문 알림 (Cafe24 + 스마트스토어)

on:
  schedule:
    # 매 5분마다 실행 (UTC 기준 — KST = UTC+9)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: read
  # CAFE24_REFRESH_TOKEN을 GitHub Variables API로 갱신하기 위해 필요
  actions: write

jobs:
  check-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # 5분 주기이므로 4분 안에 반드시 종료

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 주문 알림 상태 복원 (이전 run에서 저장한 seen 목록)
        uses: actions/cache@v4
        with:
          path: data/notified_cloud.json
          # run_id를 키에 포함 → 매 run마다 새 항목 저장
          # restore-keys prefix로 직전 run의 캐시를 복원
          key: order-state-${{ github.run_id }}
          restore-keys: |
            order-state-

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 주문 확인 및 Discord 알림 발송
        env:
          # Cafe24 (리프레시 토큰은 Variable로 — 워크플로우가 갱신 가능)
          CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
          CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
          CAFE24_MALL_ID: ${{ secrets.CAFE24_MALL_ID }}
          CAFE24_REDIRECT_URI: ${{ secrets.CAFE24_REDIRECT_URI }}
          CAFE24_REFRESH_TOKEN: ${{ vars.CAFE24_REFRESH_TOKEN }}
          # 네이버
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # Discord
          DISCORD_WEBHOOK_URL_ORDERS: ${{ secrets.DISCORD_WEBHOOK_URL_ORDERS }}
          # GitHub API (토큰 갱신용)
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # config.py가 META_ACCESS_TOKEN을 require하므로 빈 값으로 통과
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: unused
        run: python cloud_order_watcher.py
